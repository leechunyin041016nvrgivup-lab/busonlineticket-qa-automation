[pytest]
# ─────────────────────────────────────────────
#  pytest configuration — BusOnlineTicket QA
# ─────────────────────────────────────────────

# Test discovery
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Registered markers (suppresses PytestUnknownMarkWarning)
markers =
    ui: UI tests executed via Selenium WebDriver
    api: API tests executed via requests library

# Output settings
addopts =
    -v
    --tb=short
    --no-header
    -p no:warnings

# Console output — always show print() statements
log_cli = true
log_cli_level = INFO