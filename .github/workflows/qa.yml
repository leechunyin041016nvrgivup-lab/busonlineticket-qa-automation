name: QA Automation Tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── 2. Python ──────────────────────────────────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # ── 3. Chrome + ChromeDriver (matched versions, no webdriver-manager) ──
      - name: Set up Chrome
        uses: browser-actions/setup-chrome@v1
        id: setup-chrome

      # ── 4. Dependencies ────────────────────────────────────────────────────
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # ── 5. Confirm Chrome + ChromeDriver versions ──────────────────────────
      - name: Verify Chrome and ChromeDriver
        run: |
          google-chrome --version
          chromedriver --version

      # ── 6. API tests (no browser needed) ──────────────────────────────────
      - name: Run API tests
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          pytest -m api -v

      # ── 7. UI tests (headless Chrome, system chromedriver) ─────────────────
      - name: Run UI tests
        env:
          UI_MODE: headless
          BROWSER: chrome
          PYTHONPATH: ${{ github.workspace }}
          # Tell driver_factory.py exactly where the chromedriver binary is.
          # setup-chrome installs both chrome + chromedriver and puts chromedriver on PATH.
          CHROMEDRIVER_PATH: ${{ steps.setup-chrome.outputs.chromedriver-path }}
        run: |
          pytest -m "ui and not signup" -v
        # signup excluded — uses input() to wait for OTP, would hang forever in CI

      # ── 8. Upload HTML reports ─────────────────────────────────────────────
      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: reports/
          retention-days: 14